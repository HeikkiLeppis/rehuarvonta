<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Rehuarvonta</title>

<style>
:root {
  --brand: #038c3e;
  --primary: #0078d4;
  --border: #dcdcdc;
}

body {
  margin: 0;
  background: #f4f6f8;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
}

.wrap {
  max-width: 640px;
  margin: 40px auto;
  padding: 28px;
  background: #fff;
  border-radius: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,.12);
}

h1 {
  margin-top: 0;
}

label {
  display: block;
  margin-top: 18px;
  font-weight: 700;
}

input, select, textarea {
  width: 100%;
  padding: 14px;
  font-size: 18px;
  border-radius: 12px;
  border: 1px solid var(--border);
}

textarea {
  min-height: 100px;
}

.pills {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin-top: 12px;
}

.pill {
  padding: 12px 22px;
  border-radius: 999px;
  border: 2px solid var(--brand);
  background: #fff;
  color: var(--brand);
  font-weight: 800;
  cursor: pointer;
}

.pill.active {
  background: var(--brand);
  color: #fff;
}

button.submit {
  margin-top: 28px;
  width: 100%;
  padding: 16px;
  font-size: 20px;
  font-weight: 900;
  border-radius: 999px;
  border: 0;
  background: var(--primary);
  color: #fff;
  position: relative;
}

button.submit.loading {
  pointer-events: none;
  opacity: 0.75;
}

button.submit.loading::after {
  content: "";
  width: 22px;
  height: 22px;
  border: 3px solid #ffffff80;
  border-top-color: #ffffff;
  border-radius: 50%;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  animation: spin 0.9s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.hint {
  margin-top: 14px;
  color: #b00020;
  font-weight: 600;
}
</style>
</head>

<body>
<div class="wrap">
  <h1>Osallistu rehuarvontaan</h1>

  <label>Nimi *</label>
  <input id="name" />

  <label>Puhelin *</label>
  <input id="phone" inputmode="tel" />

  <label>Tuotantosuunta *</label>
  <select id="production">
    <option value="">— valitse —</option>
    <option>Lypsykarjatila</option>
    <option>Lihakarjatila</option>
    <option>Emolehmätila</option>
    <option>Muu</option>
  </select>

  <label id="animalLabel">Eläinmäärä *</label>
  <input id="animalCount" type="number" />

  <label>Kiinnostunut *</label>
  <div class="pills" id="interestPills"></div>

  <label>Lisätiedot</label>
  <textarea id="notes"></textarea>

  <button class="submit" id="submitBtn" type="button">
    Lähetä
  </button>

  <div class="hint" id="hint"></div>
</div>

<script>
/* ================== ASETUKSET ================== */

const POWER_AUTOMATE_URL =
  "PASTE_YOUR_POWER_AUTOMATE_URL_HERE";

const API_KEY = "rehuarvonta-2026";

/* ================== STATE ================== */

let isSubmitting = false;
let selectedInterests = [];

/* ================== INTEREST PILLS ================== */

const interests = [
  "Ruokintasuunnitelma",
  "Tilakäynti",
  "Rehutarjous",
  "Muu"
];

const pillsHost = document.getElementById("interestPills");

interests.forEach(text => {
  const b = document.createElement("button");
  b.type = "button";
  b.className = "pill";
  b.textContent = text;
  b.onclick = () => {
    b.classList.toggle("active");
    if (selectedInterests.includes(text)) {
      selectedInterests = selectedInterests.filter(x => x !== text);
    } else {
      selectedInterests.push(text);
    }
  };
  pillsHost.appendChild(b);
});

/* ================== ELÄINLABEL ================== */

const animalLabel = document.getElementById("animalLabel");

document.getElementById("production").addEventListener("change", e => {
  const map = {
    "Lypsykarjatila": "Lypsävien määrä",
    "Lihakarjatila": "Lihakarjan määrä",
    "Emolehmätila": "Emolehmien määrä",
    "Muu": "Eläinten määrä"
  };
  animalLabel.textContent = (map[e.target.value] || "Eläinmäärä") + " *";
});

/* ================== SUBMIT ================== */

document.getElementById("submitBtn").addEventListener("click", submitForm);

async function submitForm() {
  if (isSubmitting) return;

  const hint = document.getElementById("hint");
  hint.textContent = "";

  const name = document.getElementById("name").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const production = document.getElementById("production").value;
  const count = document.getElementById("animalCount").value;
  const notes = document.getElementById("notes").value;

  if (!name || !phone || !production || !count || selectedInterests.length === 0) {
    hint.textContent = "Täytä kaikki pakolliset kentät.";
    return;
  }

  isSubmitting = true;
  const btn = document.getElementById("submitBtn");
  btn.classList.add("loading");
  btn.textContent = "Lähetetään…";

  const payload = {
    campaign: "Rehuarvonta",
    submittedAt: new Date().toISOString(),
    name,
    phone,
    production,
    interests: selectedInterests,
    notes
  };

  payload[
    production === "Lypsykarjatila" ? "countDairy" :
    production === "Lihakarjatila" ? "countBeef" :
    production === "Emolehmätila" ? "countCows" :
    "countOther"
  ] = count;

  try {
    const res = await fetch(POWER_AUTOMATE_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "X-API-KEY": API_KEY
      },
      body: JSON.stringify(payload)
    });

    if (!res.ok) throw new Error("HTTP " + res.status);

    document.querySelector(".wrap").innerHTML =
      "<h1>Kiitos! ✅</h1><p>Osallistumisesi on vastaanotettu.</p>";

  } catch (err) {
    console.error(err);
    isSubmitting = false;
    btn.classList.remove("loading");
    btn.textContent = "Lähetä";
    hint.textContent = "Lähetys epäonnistui. Yritä uudelleen.";
  }
}
</script>
</body>
</html>
``
